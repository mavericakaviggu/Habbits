# Application Configuration
spring.application.name=habits-tracker

# Server Configuration
server.port=8080
server.address=0.0.0.0

# H2 Database Configuration (Development) - File-based for persistence
spring.datasource.url=jdbc:h2:file:./data/habitsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration (allow React frontend from localhost and network)
cors.allowed.origins=http://localhost:3000,http://192.168.1.10:3000

# MySQL Configuration (Production - uncomment and configure when ready)
#spring.datasource.url=jdbc:mysql://localhost:3306/habitsdb
